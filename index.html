<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panther</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--font:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;}
    body{width:100vw;height:100vh;overflow:hidden;background:#030303;font-family:var(--font);}
    canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

    .glow-text{
      background:linear-gradient(160deg,rgba(255,255,255,1) 0%,rgba(255,255,255,0.82) 45%,rgba(255,255,255,0.6) 70%,rgba(255,255,255,0.88) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 0 10px rgba(255,255,255,0.85)) drop-shadow(0 0 22px rgba(255,255,255,0.5));
    }

    /* CENTER BAR */
    .center-bar{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;
      backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.11);
      border-radius:999px;padding:15px 44px;
      display:inline-flex;align-items:center;gap:22px;
      box-shadow:0 8px 32px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .bar-title{font-size:25px;font-weight:500;letter-spacing:0.16em;}
    .bar-divider{width:1px;height:24px;background:rgba(255,255,255,0.15);}
    .time-wrap{display:inline-flex;align-items:baseline;gap:7px;}
    .time{font-size:25px;font-weight:300;letter-spacing:0.07em;}
    .ampm{font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:0.13em;}

    /* TASKBAR */
    .taskbar{
      position:fixed;bottom:0;left:0;right:0;height:58px;z-index:20;
      backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
      background:rgba(0,0,0,0.55);
      border-top:1px solid rgba(255,255,255,0.09);
      box-shadow:0 -4px 30px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06);
      display:flex;align-items:center;justify-content:center;gap:4px;padding:0 20px;
    }
    .taskbar-brand{position:absolute;left:20px;font-size:13px;font-weight:600;letter-spacing:0.14em;}
    .taskbar-clock{position:absolute;right:20px;display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
    .tb-time{font-size:12px;color:rgba(255,255,255,0.75);letter-spacing:0.05em;}
    .tb-date{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.04em;}
    .dock-item{
      position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;width:52px;height:52px;
      transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .dock-item:hover{transform:translateY(-8px) scale(1.2);}
    .dock-item:hover .tooltip{opacity:1;transform:translateY(0);}
    .dock-item:active{transform:translateY(-4px) scale(1.05);}
    .icon-wrap{
      width:42px;height:42px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
      transition:background 0.2s,box-shadow 0.2s;
    }
    .dock-item:hover .icon-wrap{background:rgba(255,255,255,0.1);box-shadow:0 0 18px rgba(255,255,255,0.12);}
    .icon-wrap img{width:26px;height:26px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(255,255,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.45));}
    .icon-wrap svg{filter:drop-shadow(0 0 5px rgba(255,255,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.45));transition:transform 0.6s ease;}
    .dock-item:hover .icon-wrap svg{transform:rotate(65deg);}
    .dock-sep{width:1px;height:32px;background:rgba(255,255,255,0.1);margin:0 6px;}
    .tooltip{
      position:absolute;bottom:calc(100% + 8px);
      background:rgba(0,0,0,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.11);border-radius:8px;padding:4px 10px;
      font-size:11px;color:rgba(255,255,255,0.85);white-space:nowrap;
      opacity:0;transform:translateY(4px);transition:opacity 0.15s,transform 0.15s;pointer-events:none;
    }

    /* ═══ BROWSER WINDOW ═══ */
    .browser-window{
      position:fixed;z-index:30;
      width:960px;height:640px;
      top:calc(50% - 29px);left:50%;
      transform:translate(-50%,-50%);
      border-radius:14px;overflow:hidden;
      backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
      background:rgba(6,6,6,0.88);
      border:1px solid rgba(255,255,255,0.13);
      box-shadow:0 30px 90px rgba(0,0,0,0.85),inset 0 1px 0 rgba(255,255,255,0.07);
      display:none;flex-direction:column;
      min-width:480px;min-height:320px;
      transition:box-shadow 0.2s;
    }
    .browser-window.open{display:flex;}
    .browser-window.fullscreen{
      top:0!important;left:0!important;
      transform:none!important;
      width:100vw!important;height:calc(100vh - 58px)!important;
      border-radius:0!important;resize:none;
    }

    /* resize handle */
    .resize-handle{
      position:absolute;right:0;bottom:0;
      width:16px;height:16px;cursor:se-resize;z-index:5;
      background:linear-gradient(135deg,transparent 50%,rgba(255,255,255,0.12) 50%);
      border-radius:0 0 14px 0;
    }

    /* Title bar */
    .browser-titlebar{
      height:40px;background:rgba(0,0,0,0.4);
      border-bottom:1px solid rgba(255,255,255,0.07);
      display:flex;align-items:center;gap:8px;
      padding:0 12px;cursor:move;user-select:none;flex-shrink:0;
    }
    .tl{width:12px;height:12px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:filter 0.15s;}
    .tl:hover{filter:brightness(1.4);}
    .tl-close{background:#ff5f57;}
    .tl-min{background:#febc2e;}
    .tl-max{background:#28c840;}
    .tabs-bar{flex:1;display:flex;align-items:center;gap:3px;overflow-x:auto;scrollbar-width:none;padding:0 6px;}
    .tabs-bar::-webkit-scrollbar{display:none;}
    .tab{
      display:flex;align-items:center;gap:5px;padding:4px 10px;
      border-radius:7px;background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.05);
      font-size:11px;color:rgba(255,255,255,0.45);
      cursor:pointer;white-space:nowrap;max-width:150px;min-width:80px;
      transition:background 0.15s,color 0.15s;flex-shrink:0;
    }
    .tab.active{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.88);border-color:rgba(255,255,255,0.11);}
    .tab-favicon{width:12px;height:12px;border-radius:2px;flex-shrink:0;opacity:0.7;}
    .tab-title{overflow:hidden;text-overflow:ellipsis;flex:1;}
    .tab-x{
      width:13px;height:13px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:9px;color:rgba(255,255,255,0.25);
      transition:background 0.15s,color 0.15s;
    }
    .tab-x:hover{background:rgba(255,255,255,0.12);color:#fff;}
    .new-tab{
      width:24px;height:24px;border-radius:6px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
      font-size:15px;color:rgba(255,255,255,0.35);cursor:pointer;
      transition:background 0.15s,color 0.15s;
    }
    .new-tab:hover{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.8);}

    /* Toolbar */
    .browser-toolbar{
      height:46px;padding:0 10px;
      background:rgba(0,0,0,0.25);
      border-bottom:1px solid rgba(255,255,255,0.05);
      display:flex;align-items:center;gap:7px;flex-shrink:0;
    }
    .nav-btn{
      width:28px;height:28px;border-radius:8px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
      cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;
      transition:background 0.15s,color 0.15s;
    }
    .nav-btn:hover{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.85);}
    .nav-btn:disabled{opacity:0.25;cursor:default;}
    .address-bar-wrap{
      flex:1;position:relative;display:flex;align-items:center;
    }
    .address-bar{
      width:100%;height:32px;border-radius:999px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.09);
      color:rgba(255,255,255,0.85);font-size:12.5px;
      font-family:var(--font);padding:0 36px 0 36px;
      outline:none;transition:border-color 0.15s,background 0.15s;
      letter-spacing:0.02em;
    }
    .address-bar:focus{border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.08);}
    .address-icon{
      position:absolute;left:11px;
      color:rgba(255,255,255,0.28);font-size:12px;pointer-events:none;
    }
    .address-go{
      position:absolute;right:8px;
      width:20px;height:20px;border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:rgba(255,255,255,0.5);font-size:10px;
      transition:background 0.15s,color 0.15s;
    }
    .address-go:hover{background:rgba(255,255,255,0.15);color:#fff;}

    /* Content area */
    .browser-content{
      flex:1;position:relative;overflow:hidden;background:#080808;
    }
    .browser-frame{
      width:100%;height:100%;border:none;background:#fff;
      display:block;
    }

    /* New tab page */
    .newtab-page{
      position:absolute;inset:0;
      background:rgba(6,6,6,0.95);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
    }
    .newtab-logo{
      font-size:42px;font-weight:600;letter-spacing:0.14em;
      background:linear-gradient(160deg,rgba(255,255,255,1) 0%,rgba(255,255,255,0.5) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 0 18px rgba(255,255,255,0.4));
    }
    .newtab-search{
      display:flex;align-items:center;gap:0;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:999px;overflow:hidden;
      width:480px;height:44px;
    }
    .newtab-search input{
      flex:1;background:transparent;border:none;outline:none;
      color:rgba(255,255,255,0.9);font-size:14px;font-family:var(--font);
      padding:0 20px;height:100%;letter-spacing:0.02em;
    }
    .newtab-search input::placeholder{color:rgba(255,255,255,0.28);}
    .newtab-search-btn{
      width:44px;height:44px;background:rgba(255,255,255,0.08);
      border-left:1px solid rgba(255,255,255,0.08);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:rgba(255,255,255,0.6);font-size:15px;
      transition:background 0.15s,color 0.15s;
    }
    .newtab-search-btn:hover{background:rgba(255,255,255,0.14);color:#fff;}
    .newtab-shortcuts{
      display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:460px;
    }
    .shortcut{
      display:flex;flex-direction:column;align-items:center;gap:7px;
      cursor:pointer;padding:10px;border-radius:12px;
      transition:background 0.15s;
    }
    .shortcut:hover{background:rgba(255,255,255,0.05);}
    .shortcut-icon{
      width:46px;height:46px;border-radius:12px;
      background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);
      display:flex;align-items:center;justify-content:center;font-size:20px;
    }
    .shortcut-label{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.04em;}

    /* Loading bar */
    .load-bar{
      position:absolute;top:0;left:0;height:2px;
      background:linear-gradient(90deg,rgba(255,255,255,0.3),rgba(255,255,255,0.8));
      border-radius:1px;width:0%;transition:width 0.3s ease;
      z-index:5;pointer-events:none;
    }

    /* Settings Panel */
    .settings-overlay{
      position:fixed;inset:0;z-index:50;
      display:flex;align-items:flex-end;justify-content:center;
      padding-bottom:68px;
      background:rgba(0,0,0,0.25);
      opacity:0;pointer-events:none;transition:opacity 0.2s;
    }
    .settings-overlay.open{opacity:1;pointer-events:all;}
    .settings-panel{
      backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
      background:rgba(0,0,0,0.52);border:1px solid rgba(255,255,255,0.11);
      border-radius:20px;padding:24px 26px;width:340px;
      box-shadow:0 -4px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.07);
      transform:translateY(20px);transition:transform 0.28s cubic-bezier(0.34,1.4,0.64,1);
    }
    .settings-overlay.open .settings-panel{transform:translateY(0);}
    .settings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
    .settings-title{font-size:15px;font-weight:600;letter-spacing:0.06em;color:rgba(255,255,255,0.9);}
    .settings-close{
      width:26px;height:26px;border-radius:50%;
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:rgba(255,255,255,0.55);font-size:13px;
      transition:background 0.15s,color 0.15s;
    }
    .settings-close:hover{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);}
    .s-section{margin-bottom:16px;}
    .s-label{font-size:9.5px;font-weight:700;letter-spacing:0.13em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:8px;}
    .s-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:11px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);margin-bottom:5px;}
    .s-row-label{font-size:12.5px;color:rgba(255,255,255,0.78);}
    .toggle{width:38px;height:21px;border-radius:11px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.08);position:relative;cursor:pointer;transition:background 0.2s;}
    .toggle.on{background:rgba(255,255,255,0.55);}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:13px;height:13px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.4);transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);}
    .toggle.on::after{transform:translateX(17px);}
    .s-slider{-webkit-appearance:none;appearance:none;width:100px;height:3px;border-radius:2px;background:rgba(255,255,255,0.15);outline:none;cursor:pointer;}
    .s-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,0.4);cursor:pointer;}
    .color-row{display:flex;gap:7px;}
    .swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s,transform 0.15s;}
    .swatch:hover{transform:scale(1.18);}
    .swatch.active{border-color:rgba(255,255,255,0.7);}
    .s-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:5px 9px;color:rgba(255,255,255,0.85);font-size:12.5px;font-family:var(--font);outline:none;width:120px;transition:border-color 0.15s;}
    .s-input:focus{border-color:rgba(255,255,255,0.28);}
  </style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Center bar -->
<div class="center-bar">
  <span class="glow-text bar-title" id="barTitle">panther</span>
  <div class="bar-divider"></div>
  <div class="time-wrap">
    <span class="glow-text time" id="td"></span>
    <span class="ampm" id="ap"></span>
  </div>
</div>

<!-- Browser Window -->
<div class="browser-window" id="browserWindow">
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- Title bar -->
  <div class="browser-titlebar" id="titlebar">
    <div class="tl tl-close" onclick="closeBrowser()" title="Close"></div>
    <div class="tl tl-min" onclick="minimizeBrowser()" title="Minimize"></div>
    <div class="tl tl-max" onclick="toggleFullscreen()" title="Fullscreen"></div>
    <div class="tabs-bar" id="tabsBar"></div>
    <div class="new-tab" onclick="newTab()" title="New tab">+</div>
  </div>

  <!-- Toolbar -->
  <div class="browser-toolbar">
    <div class="nav-btn" id="btnBack" onclick="navBack()" title="Back">&#8592;</div>
    <div class="nav-btn" id="btnFwd" onclick="navFwd()" title="Forward">&#8594;</div>
    <div class="nav-btn" onclick="reloadTab()" title="Reload">&#8635;</div>
    <div class="address-bar-wrap">
      <span class="address-icon">&#128269;</span>
      <input class="address-bar" id="addressBar" type="text" placeholder="Search Google or type a URL..."
        onkeydown="if(event.key==='Enter')navigate(this.value)"/>
      <div class="address-go" onclick="navigate(document.getElementById('addressBar').value)">&#8594;</div>
    </div>
  </div>

  <!-- Content -->
  <div class="browser-content" id="browserContent">
    <div class="load-bar" id="loadBar"></div>
    <!-- tabs rendered here -->
  </div>
</div>

<!-- Taskbar -->
<div class="taskbar">
  <span class="glow-text taskbar-brand" id="tbBrand">panther</span>

          oninput="document.getElementById('barTitle').textContent=this.value;document.getElementById('tbBrand').textContent=this.value"/>

      </div>

        <div class="toggle on" onclick="this.classList.toggle('on');showStreaks=this.classList.contains('on')"></div>

          <div class="swatch active" style="background:#fff" onclick="setPColor(255,255,255,this)"></div>
          <div class="swatch" style="background:#a78bfa" onclick="setPColor(167,139,250,this)"></div>
          <div class="swatch" style="background:#60a5fa" onclick="setPColor(96,165,250,this)"></div>
          <div class="swatch" style="background:#34d399" onclick="setPColor(52,211,153,this)"></div>
          <div class="swatch" style="background:#fb7185" onclick="setPColor(251,113,133,this)"></div>
        </div>

<script>
// ── Canvas background ──
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let pR=255,pG=255,pB=255,glowOpacity=0.6,showStreaks=true,targetCount=120,use24=false;
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();window.addEventListener('resize',resize);
class Particle{
  constructor(){this.reset(true);}
  reset(init){this.x=Math.random()*canvas.width;this.y=init?Math.random()*canvas.height:canvas.height+5;this.r=Math.random()*1.2+0.3;this.speed=Math.random()*0.25+0.05;this.opacity=Math.random()*0.5+0.1;this.drift=(Math.random()-0.5)*0.12;this.pulse=Math.random()*Math.PI*2;this.pulseSpeed=Math.random()*0.015+0.005;}
  update(){this.y-=this.speed;this.x+=this.drift;this.pulse+=this.pulseSpeed;if(this.y<-5)this.reset(false);}
  draw(){const a=this.opacity*(0.7+0.3*Math.sin(this.pulse));ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(${pR},${pG},${pB},${a})`;ctx.fill();}
}
const particles=[];for(let i=0;i<120;i++)particles.push(new Particle());
const lines=[];for(let i=0;i<6;i++)lines.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,len:Math.random()*100+50,speed:Math.random()*0.3+0.1,opacity:Math.random()*0.06+0.02,angle:-Math.PI/2+(Math.random()-0.5)*0.3});
function drawBg(){
  ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#030303';ctx.fillRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2,cy=canvas.height/2;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,canvas.width*0.6);
  g.addColorStop(0,`rgba(${pR*.15},${pG*.15},${pB*.15},${glowOpacity})`);g.addColorStop(1,'rgba(3,3,3,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  if(showStreaks)lines.forEach(l=>{l.y-=l.speed;if(l.y<-l.len){l.y=canvas.height+l.len;l.x=Math.random()*canvas.width;}const x2=l.x+Math.cos(l.angle)*l.len,y2=l.y+Math.sin(l.angle)*l.len;const lg=ctx.createLinearGradient(l.x,l.y,x2,y2);lg.addColorStop(0,`rgba(${pR},${pG},${pB},0)`);lg.addColorStop(0.5,`rgba(${pR},${pG},${pB},${l.opacity})`);lg.addColorStop(1,`rgba(${pR},${pG},${pB},0)`);ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(x2,y2);ctx.strokeStyle=lg;ctx.lineWidth=0.5;ctx.stroke();});
  while(particles.length<targetCount)particles.push(new Particle());while(particles.length>targetCount)particles.pop();
  particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(drawBg);
}
drawBg();

// ── Clock ──
function updateClock(){
  const now=new Date();let h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('tb-date').textContent=days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate();
  if(use24){document.getElementById('td').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');document.getElementById('ap').textContent='';document.getElementById('tb-time').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
  else{const ampm=h>=12?'PM':'AM';h=h%12||12;document.getElementById('td').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');document.getElementById('ap').textContent=ampm;document.getElementById('tb-time').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+' '+ampm;}
}
updateClock();setInterval(updateClock,1000);

// ── Settings ──
function openSettings(){document.getElementById('settingsOverlay').classList.add('open');}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('open');}
function closeOutside(e){if(e.target===document.getElementById('settingsOverlay'))closeSettings();}
function setPColor(r,g,b,el){pR=r;pG=g;pB=b;document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));el.classList.add('active');}

// ══════════════════════════════════════════
// BROWSER ENGINE
// ══════════════════════════════════════════
let tabs=[];
let activeTabId=null;
let isFullscreen=false;
let swRegistered=false;

const BW=document.getElementById('browserWindow');
const tabsBar=document.getElementById('tabsBar');
const addressBar=document.getElementById('addressBar');
const browserContent=document.getElementById('browserContent');
const loadBar=document.getElementById('loadBar');

// Register UV service worker
async function registerSW(){
  if(swRegistered)return;
  try{
    if('serviceWorker' in navigator){
      await navigator.serviceWorker.register('/uv/sw.js',{scope:'/uv/service/'});
      swRegistered=true;
    }
  }catch(e){console.warn('SW registration failed (expected if not on localhost):',e);}
}

function openBrowser(){
  BW.classList.add('open');
  registerSW();
  if(tabs.length===0)newTab();
}
function closeBrowser(){BW.classList.remove('open');}
function minimizeBrowser(){BW.classList.remove('open');}
function toggleFullscreen(){
  isFullscreen=!isFullscreen;
  BW.classList.toggle('fullscreen',isFullscreen);
}

function tabId(){return 't'+Date.now()+Math.random().toString(36).slice(2);}

function newTab(url){
  const id=tabId();
  const frame=document.createElement('iframe');
  frame.className='browser-frame';
  frame.style.display='none';
  frame.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation');
  browserContent.appendChild(frame);
  const tab={id,frame,title:'New Tab',url:url||''};
  tabs.push(tab);
  renderTabs();
  switchTab(id);
  if(url)loadUrl(id,url);
  else showNewTabPage(id);
}

function showNewTabPage(id){
  const tab=tabs.find(t=>t.id===id);
  if(!tab)return;
  // Remove old newtab page if any
  const old=browserContent.querySelector('.newtab-page');
  if(old)old.remove();
  const page=document.createElement('div');
  page.className='newtab-page';
  page.id='ntp_'+id;
  page.innerHTML=`
    <div class="newtab-logo">panther</div>
    <div class="newtab-search">
      <input type="text" placeholder="Search Google or type a URL..." id="ntpInput_${id}"
        onkeydown="if(event.key==='Enter')navigate(this.value)"/>
      <div class="newtab-search-btn" onclick="navigate(document.getElementById('ntpInput_${id}').value)">&#8594;</div>
    </div>
    <div class="newtab-shortcuts">
      <div class="shortcut" onclick="navigate('https://google.com')">
        <div class="shortcut-icon">🔍</div><div class="shortcut-label">Google</div>
      </div>
      <div class="shortcut" onclick="navigate('https://youtube.com')">
        <div class="shortcut-icon">▶</div><div class="shortcut-label">YouTube</div>
      </div>
      <div class="shortcut" onclick="navigate('https://github.com')">
        <div class="shortcut-icon">🐙</div><div class="shortcut-label">GitHub</div>
      </div>
      <div class="shortcut" onclick="navigate('https://reddit.com')">
        <div class="shortcut-icon">📰</div><div class="shortcut-label">Reddit</div>
      </div>
      <div class="shortcut" onclick="navigate('https://twitch.tv')">
        <div class="shortcut-icon">🎮</div><div class="shortcut-label">Twitch</div>
      </div>
      <div class="shortcut" onclick="navigate('https://discord.com')">
        <div class="shortcut-icon">💬</div><div class="shortcut-label">Discord</div>
      </div>
    </div>`;
  browserContent.appendChild(page);
  tab.frame.style.display='none';
  addressBar.value='';
}

function switchTab(id){
  activeTabId=id;
  tabs.forEach(t=>{
    t.frame.style.display='none';
    const ntp=document.getElementById('ntp_'+t.id);
    if(ntp)ntp.style.display='none';
  });
  const tab=tabs.find(t=>t.id===id);
  if(!tab)return;
  if(tab.url){
    tab.frame.style.display='block';
    addressBar.value=tab.url;
  } else {
    const ntp=document.getElementById('ntp_'+id);
    if(ntp)ntp.style.display='flex';
    addressBar.value='';
  }
  renderTabs();
}

function closeTab(id,e){
  e.stopPropagation();
  const idx=tabs.findIndex(t=>t.id===id);
  const tab=tabs[idx];
  tab.frame.remove();
  const ntp=document.getElementById('ntp_'+id);
  if(ntp)ntp.remove();
  tabs.splice(idx,1);
  if(tabs.length===0){closeBrowser();return;}
  const next=tabs[Math.min(idx,tabs.length-1)];
  switchTab(next.id);
  renderTabs();
}

function renderTabs(){
  tabsBar.innerHTML='';
  tabs.forEach(t=>{
    const el=document.createElement('div');
    el.className='tab'+(t.id===activeTabId?' active':'');
    el.innerHTML=`<span class="tab-title">${t.title}</span><span class="tab-x" onclick="closeTab('${t.id}',event)">&#10005;</span>`;
    el.onclick=()=>switchTab(t.id);
    tabsBar.appendChild(el);
  });
}

function processUrl(raw){
  raw=raw.trim();
  if(!raw)return null;
  if(/^https?:\/\//i.test(raw))return raw;
  if(/^[\w-]+\.[\w]{2,}/.test(raw)&&!raw.includes(' '))return'https://'+raw;
  return'https://www.google.com/search?q='+encodeURIComponent(raw);
}

function navigate(raw){
  const url=processUrl(raw);
  if(!url)return;
  if(activeTabId)loadUrl(activeTabId,url);
}

function loadUrl(id,url){
  const tab=tabs.find(t=>t.id===id);
  if(!tab)return;
  tab.url=url;
  tab.title=new URL(url).hostname||url;
  renderTabs();
  addressBar.value=url;
  // Hide new tab page
  const ntp=document.getElementById('ntp_'+id);
  if(ntp)ntp.style.display='none';

  // Show load bar animation
  loadBar.style.width='0%';
  setTimeout(()=>loadBar.style.width='60%',50);
  setTimeout(()=>loadBar.style.width='85%',600);

  // Try UV proxy first (only works on localhost with server)
  let proxied=false;
  if(swRegistered && typeof __uv$config !=='undefined'){
    try{
      const encoded=__uv$config.prefix+__uv$config.encodeUrl(url);
      tab.frame.src=encoded;
      proxied=true;
    }catch(e){}
  }

  if(!proxied){
    // Direct iframe attempt — works for embeddable sites
    tab.frame.src=url;
  }

  tab.frame.style.display='block';

  tab.frame.onload=()=>{
    loadBar.style.width='100%';
    setTimeout(()=>loadBar.style.width='0%',400);
    try{tab.title=tab.frame.contentDocument.title||new URL(url).hostname;}catch(e){tab.title=new URL(url).hostname;}
    renderTabs();
    if(id===activeTabId)addressBar.value=url;
  };

  tab.frame.onerror=()=>{
    loadBar.style.width='0%';
    // Open in new browser tab as fallback
    window.open(url,'_blank');
    tab.url='';tab.title='Blocked';
    tab.frame.style.display='none';
    showNewTabPage(id);
    renderTabs();
  };
}

function navBack(){const tab=tabs.find(t=>t.id===activeTabId);if(tab&&tab.frame)try{tab.frame.contentWindow.history.back();}catch(e){}}
function navFwd(){const tab=tabs.find(t=>t.id===activeTabId);if(tab&&tab.frame)try{tab.frame.contentWindow.history.forward();}catch(e){}}
function reloadTab(){const tab=tabs.find(t=>t.id===activeTabId);if(tab&&tab.url)loadUrl(activeTabId,tab.url);}

// ── Drag to move ──
(function(){
  const titlebar=document.getElementById('titlebar');
  let dragging=false,startX,startY,origLeft,origTop;
  titlebar.addEventListener('mousedown',e=>{
    if(isFullscreen)return;
    if(e.target.classList.contains('tl')||e.target.classList.contains('new-tab')||e.target.classList.contains('tab')||e.target.classList.contains('tab-x'))return;
    dragging=true;
    const r=BW.getBoundingClientRect();
    startX=e.clientX;startY=e.clientY;origLeft=r.left;origTop=r.top;
    BW.style.transform='none';BW.style.left=origLeft+'px';BW.style.top=origTop+'px';
    document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    BW.style.left=(origLeft+e.clientX-startX)+'px';
    BW.style.top=(origTop+e.clientY-startY)+'px';
  });
  document.addEventListener('mouseup',()=>{dragging=false;document.body.style.userSelect='';});
})();

// ── Resize ──
(function(){
  const handle=document.getElementById('resizeHandle');
  let resizing=false,startX,startY,startW,startH;
  handle.addEventListener('mousedown',e=>{
    if(isFullscreen)return;
    resizing=true;startX=e.clientX;startY=e.clientY;
    startW=BW.offsetWidth;startH=BW.offsetHeight;
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!resizing)return;
    const w=Math.max(480,startW+e.clientX-startX);
    const h=Math.max(320,startH+e.clientY-startY);
    BW.style.width=w+'px';BW.style.height=h+'px';
  });
  document.addEventListener('mouseup',()=>resizing=false);
})();
</script>
